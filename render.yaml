services:
  - type: web
    name: payguard-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_DIR
        value: /tmp/logs
      - key: DEMO_EMAIL
        value: demo@payguard.ai
      - key: DEMO_PASSWORD
        sync: false
